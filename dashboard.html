<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atopweb</title>
<link rel="stylesheet" href="/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>

<div class="sticky-top-group">
<header>
  <div class="header-left">
    <div class="title-block">
      <div class="title-row">
        <h1 id="page-title">atopweb</h1>
        <a class="github-link" href="https://github.com/emanspeaks/atopweb" target="_blank" rel="noopener" title="View on GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <span class="conn-status">
          <span class="conn-dot" id="conn-dot"></span>
          <span id="conn-label">Connecting…</span>
          <span id="shutdown-badge" hidden></span>
        </span>
      </div>
      <div class="page-subtitle" id="page-subtitle"></div>
    </div>
  </div>
  <div class="device-info" id="device-info"></div>
  <div class="header-right">
    <button id="memsnap-btn" title="Copy memory-bar values for the first GPU as tab-delimited text (raw bytes, paste into Excel)">Memory snapshot</button>
    <div class="interval-ctrl" id="plotwidth-ctrl">
      <label for="plotwidth-input">Plot width</label>
      <input type="number" id="plotwidth-input" min="5" max="3600" step="5" value="120">
      <span>s</span>
      <button id="plotwidth-btn">Apply</button>
    </div>
    <div class="header-pause-ts">
      <span class="period" id="period-label"></span>
      <button id="pause-btn" class="pause-btn" title="Pause/resume chart updates">⏸</button>
    </div>
    <div class="interval-ctrl" id="corewidth-ctrl">
      <label for="corewidth-input">Core clock width</label>
      <input type="number" id="corewidth-input" min="5" max="3600" step="5" value="60">
      <span>s</span>
      <button id="corewidth-btn">Apply</button>
    </div>
    <div class="interval-ctrl" id="interval-ctrl">
      <label for="interval-input">Interval</label>
      <input type="number" id="interval-input" min="50" max="60000" step="50" value="1000">
      <span>ms</span>
      <button id="interval-btn">Apply</button>
    </div>
  </div>
</header>

<div id="version-banner" hidden>
  <span id="version-banner-msg"></span>
  <div class="version-banner-actions">
    <button onclick="location.reload()">Refresh page</button>
    <button onclick="document.getElementById('version-banner').hidden=true">Dismiss</button>
  </div>
</div>
</div>

<div id="system-cards" class="system-cards"></div>

<nav id="tabs"></nav>
<main id="main"></main>

<div id="plot-overlay" hidden>
  <div id="plot-overlay-header">
    <span id="plot-overlay-title"></span>
    <button id="plot-overlay-close" title="Close (Esc)">✕</button>
  </div>
  <div id="plot-overlay-body">
    <canvas id="plot-overlay-canvas"></canvas>
  </div>
</div>

<div id="mem-treemap-overlay" hidden>
  <div id="mem-tm-header">
    <span id="mem-tm-title">Memory Map</span>
    <button id="mem-tm-close" title="Close (Esc)">✕</button>
  </div>
  <div id="mem-tm-body">
    <div id="mem-tm-map"></div>
    <div id="mem-tm-legend">
      <table id="mem-tm-table">
        <thead><tr><th></th><th>Name</th><th class="right">KiB</th><th>Description</th></tr></thead>
        <tbody id="mem-tm-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="status-bar">
  <div id="status-log-wrapper">
    <div id="status-resize-handle"></div>
    <div id="status-log" tabindex="-1"></div>
  </div>
  <div id="status-bar-main">
    <span id="status-bar-text">Connecting…</span>
    <span id="status-bar-chevron">▲</span>
  </div>
</div>

<script src="/dashboard.js"></script>
</body>
</html>
