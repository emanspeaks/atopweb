name: CI

on:
  push:
  pull_request:

jobs:
  check-exempt:
    name: Check if all changes are exempt
    runs-on: ubuntu-latest
    outputs:
      all_exempt: ${{ steps.check.outputs.all_exempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run exemption check
        id: check
        run: |
          # Only meaningful for PRs targeting main; everything else is not exempt.
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.base_ref }}" != "main" ]; then
            echo "all_exempt=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXEMPTIONS_FILE=".github/workflows/exempt.txt"
          changed_files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")

          if [ -z "$changed_files" ]; then
            echo "all_exempt=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t patterns < <(grep -v '^\s*#' "$EXEMPTIONS_FILE" | grep -v '^\s*$')

          all_exempt=true
          for f in $changed_files; do
            matched=false
            for pat in "${patterns[@]}"; do
              case "$f" in
                $pat) matched=true; break ;;
              esac
            done
            if [ "$matched" = false ]; then
              all_exempt=false
              break
            fi
          done

          echo "all_exempt=${all_exempt}" >> "$GITHUB_OUTPUT"

  version-bump:
    name: VERSION must be updated
    needs: check-exempt
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && needs.check-exempt.outputs.all_exempt != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git diff "${BASE_SHA}...HEAD" -- VERSION | grep -q '^+[0-9]'; then
            echo "VERSION updated: $(cat VERSION)"
          else
            echo "::error::VERSION must be updated in every PR to main. Edit the VERSION file to bump the version."
            exit 1
          fi

  build:
    name: Build check
    needs: check-exempt
    runs-on: ubuntu-latest
    if: needs.check-exempt.outputs.all_exempt != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libdrm (CGO dependency)
        run: sudo apt-get install -y libdrm-dev

      - run: go vet ./...

      - name: Build
        run: go build -v -o atopweb .

      - name: Verify binary exists and runs
        run: ./atopweb --help || true
